
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    <title>Quran Pulse v5.0</title>
    <meta name="description" content="The Ultimate Islamic AI SuperApp" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600;800&family=Noto+Sans+Arabic:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              // v5.0 Visual Identity
              primary: {
                DEFAULT: '#00BFA5', // Teal/Cyan from Kufi
                hover: '#009688',
                light: '#64FFDA',
              },
              secondary: {
                DEFAULT: '#FFD700', // Gold from Logo
                hover: '#FFC107',
                light: '#FFE57F',
              },
              // Mapping legacy names to new identity for compatibility
              gold: {
                400: '#FFE57F',
                500: '#FFD700',
                600: '#FFC107',
              },
              teal: {
                pulse: '#00BFA5', 
                dark: '#00695C',
                400: '#1DE9B6',
                500: '#00BFA5',
              },
              islamic: {
                dark: '#050505', // Deep Onyx
                panel: '#0A0A0A', // Surface
                accent: '#00BFA5', 
              },
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              serif: ['Amiri', 'serif'],
              arabic: ['Noto Sans Arabic', 'sans-serif'],
            },
            animation: {
              'fade-in': 'fadeIn 0.5s ease-out forwards',
              'slide-up': 'slideUp 0.5s ease-out forwards',
              'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'shine': 'shine 1.5s ease-in-out infinite',
              'pulse-glow': 'pulse-glow 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              slideUp: {
                '0%': { transform: 'translateY(20px)', opacity: '0' },
                '100%': { transform: 'translateY(0)', opacity: '1' },
              },
              shine: {
                '100%': { left: '125%' }
              },
              'pulse-glow': {
                '0%, 100%': { transform: 'scale(1)', opacity: '1', filter: 'drop-shadow(0 0 10px rgba(0, 191, 165, 0.3))' },
                '50%': { transform: 'scale(1.05)', opacity: '0.9', filter: 'drop-shadow(0 0 25px rgba(0, 191, 165, 0.6))' }
              }
            }
          }
        }
      }
    </script>
    <style>

      }
      ::-webkit-scrollbar-thumb {
        background: #1e293b;
        border-radius: 2px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #334155;
      }
      
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      .bg-maze-strong {
         background-color: #050505;
         background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%2300BFA5' fill-opacity='0.08'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3Cpath d='M6 24V0h54v24h-4V4H10v20H6zm0 36V36h54v24h-4V40H10v20H6z' stroke='%2300BFA5' stroke-opacity='0.1' stroke-width='2' fill='none'/%3E%3C/g%3E%3C/svg%3E");
      }

      /* Glassmorphism utility */
      .glass {
        background: rgba(10, 10, 10, 0.6);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }
      
      /* Helper for safe area on mobile */
      .pb-safe {
        padding-bottom: env(safe-area-inset-bottom);
      }
